<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowDo · ToDoList</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/output.css" />
</head>
<body class="bg-surface min-h-dvh flex justify-center py-10 px-4">

  <main class="card">
    <h1 class="app-title">Flow<span class="text-accent">Do</span></h1>

    <form id="taskForm" class="flex gap-2 my-6">
      <input id="taskInput" type="text" placeholder="Nouvelle tâche…" class="task-input" autofocus />
      <button type="submit" class="btn">Ajouter</button>
    </form>

    <div class="flex justify-between items-center mb-4 text-sm">
      <div id="filters" class="flex gap-1">
        <button data-filter="all" class="filter-btn filter-active">Toutes</button>
        <button data-filter="active" class="filter-btn">Actives</button>
        <button data-filter="completed" class="filter-btn">Terminées</button>
      </div>
      <span id="counter" class="text-slate-400"></span>
    </div>

    <ul id="taskList" class="flex flex-col gap-2"></ul>

    <button id="clearBtn" type="button" class="btn bg-blue-800 text-xs text-white hover:text mt-6">
      Effacer les tâches terminées
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
